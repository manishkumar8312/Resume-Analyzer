spring.application.name=resume-analyzer

# Server configuration
server.port=8081

# H2 Database configuration for development
spring.datasource.url=jdbc:h2:mem:resumedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# PostgreSQL Database configuration (for production)
# spring.datasource.url=jdbc:postgresql://localhost:5432/resume_analyzer
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini API configuration
gemini.api.key=${GEMINI_API_KEY:}

# Groq API configuration
# Use environment variable GROQ_API_KEY for production
groq.api.key=${GROQ_API_KEY:}
