apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-analyzer-backend
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: resume-analyzer-backend
  template:
    metadata:
      labels:
        app: resume-analyzer-backend
    spec:
      containers:
      - name: backend
        image: your-registry.com/resume-analyzer-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: resume-config
              key: database-url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: resume-secrets
              key: db-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: resume-secrets
              key: db-password
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: resume-secrets
              key: gemini-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: resume-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/resume/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/resume/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-analyzer-frontend
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resume-analyzer-frontend
  template:
    metadata:
      labels:
        app: resume-analyzer-frontend
    spec:
      containers:
      - name: frontend
        image: your-registry.com/resume-analyzer-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL
          valueFrom:
            configMapKeyRef:
              name: resume-config
              key: api-url
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
