apiVersion: v1
kind: Service
metadata:
  name: resume-analyzer-backend-service
  namespace: production
spec:
  selector:
    app: resume-analyzer-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: resume-analyzer-frontend-service
  namespace: production
spec:
  selector:
    app: resume-analyzer-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
  loadBalancerIP: 34.123.45.67  # Replace with your static IP
